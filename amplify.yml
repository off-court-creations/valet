version: 1
applications:
  - appRoot: docs
    frontend:
      phases:
        preBuild:
          commands:
            # Install mise (runtime manager) and activate it for this shell.
            # MISE_VERSION pins the installer to a known release (supply-chain
            # hygiene — install.sh defaults to whatever is latest). Bump the
            # pin deliberately; the script reads MISE_VERSION per mise's
            # documented install mechanism.
            - curl -fsSL https://mise.jdx.dev/install.sh | MISE_VERSION=v2026.6.2 sh
            - export PATH="$HOME/.local/bin:$PATH"
            - eval "$($HOME/.local/bin/mise activate bash)"
            - ~/.local/bin/mise --version

            # Install tool versions from .mise.toml (Node, etc.)
            - ~/.local/bin/mise install

            # Verify Node version from mise
            - ~/.local/bin/mise exec -- node -v

            # Build the in-repo @archway/valet so the docs `file:..` link resolves a
            # fresh dist. Subshells keep the working directory at appRoot (docs).
            - (cd .. && ~/.local/bin/mise exec -- npm ci)
            - (cd .. && ~/.local/bin/mise exec -- npm run build)

            # Install docs deps. `@archway/valet` is `file:..`, so npm links the
            # in-repo package automatically — no global `npm link` dance, and no
            # registry fetch that would break on an unpublished version.
            - ~/.local/bin/mise exec -- npm ci

        build:
          commands:
            - ~/.local/bin/mise exec -- npm run build

      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
